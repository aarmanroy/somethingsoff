# Publishes to crates.io when a GitHub Release goes out (cargo-dist creates
# the release on tag push). Uses crates.io Trusted Publishing (GitHub OIDC) —
# no long-lived token. NOTE: a brand-new crate cannot be first-published via
# OIDC; 0.1.0 was published manually, this covers subsequent releases. The
# trusted-publisher config lives in the crate's crates.io settings.
name: publish-crates

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
